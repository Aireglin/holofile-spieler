<script>
const ALL=[{"id":"fcde6101-2091-44c0-bd34-ab33a21bd79b","type":"spc","title":"Grexx Adislo","content":"Auf Vargas 3 durch Maquis verletzt, aber erholt.","tags":["Sternenflotte","Föderation","Bolianer","Sicherheit"],"stats":{"pronouns":"","rank":"Lt. Commander","assignment":"USS Aurora","characterRole":"Sicherheitschef","species":"Bolian, Cyborg, artificial eye","careerPath":"Starfleet","focuses":"Combat Medic\nSmall Unit Tactics\nHand Phasers","attacks":"Unarmed Strike: Melee, Stun 2, Size 1H\n\nPhaser type-2: Ranged, Stun/Deadly 4, Charge, Size 1H","talents":"WARM WELCOME (Species Traits): Whenever assisting another character the Bolian may use their Presence Attribute instead of their own. Further, both the Bolian and the character being assisted may ignore any increases in Complication Range for the Task.\n\nCyborg: When you attempt a task to locate some-\nthing hidden or concealed, or to detect details not normally perceptible to that sense, you may re-roll a single d20","control":10,"daring":10,"fitness":9,"insight":9,"presence":9,"reason":7,"command":2,"conn":2,"engineering":1,"security":4,"medicine":3,"science":1,"determination":1,"stressCurrent":0},"links":["af4cdfe4-b562-4804-a840-2fd4e5c98351"]},{"id":"df920415-fcaa-4a86-89be-ac8a3ae37956","type":"logbuch","title":"1. Logbuch Taran.","content":"","tags":["Bajoraner","Runabout","Ingenieur"],"logStats":{"realDay":"6","realMonth":"12","realYear":"2368","stardate":"45930.5","linkedCharId":"42fd6edc-90ab-459e-b3a0-67c275f199ce","author":"Taran Renar","rank":"Lt. Commander","ship":"USS Aurora","subject":"Runabout Übergabe","logText":"Ich bin heute auf Deep Space Nine, um zwei neue Runabout-Shuttles für die Aurora zu übernehmen. Laut den technischen Unterlagen sind sie in „perfektem Zustand“. Natürlich. Das behaupten menschliche Ingenieure immer. Ich habe gelernt, dass\n„perfekt“ bei ihnen meist bedeutet: „Gerade so nicht explodiert.“ Also habe ich mir die Shuttles persönlich vorgenommen. Und siehe da – die EPS-Leitungen sind zwar innerhalb der Spezifikationen, aber nicht optimal kalibriert. Die Trägheitsdämpfer reagieren zu sensibel, und die Diagnosesoftware ist zwei Versionen hinter dem aktuellen Stand. Standardprotokoll, sagen sie. Ich nenne es: Nachlässigkeit.\n\nIch habe die Übergabe abgeschlossen, aber nicht ohne ein paar deutliche Worte an das Technikteam der Station. Die Aurora nimmt keine halben Sachen. Wenn ich etwas übernehme, dann ist es danach besser als vorher – ob es den Menschen\npasst oder nicht. Nach der Übergabe bin ich noch in Quark’s Bar eingekehrt. Ich war schon lange nicht mehr hier. Damals, als die Station noch Terok Nor hieß und unter cardassianischer Kontrolle stand, war ich nicht als Offizier hier – sondern als\nWiderstandskämpfer. Ich erinnere mich an die Schatten, an das Flackern der Notbeleuchtung, an das Gefühl, jederzeit entdeckt zu werden. Heute ist alles heller, lauter, geschäftiger. Aber die Wände erinnern sich. Ich auch.\n\nIn der Bar traf ich auf Okir. Der ach so tolle Wissenschaftler kam gerade aus einer Holosuite – zusammen mit einem Menschen und einer sehr attraktiven Trill. Alle waren verschwitzt, offenbar hatten sie irgendeine sportliche Simulation durchgezogen. Okir sah ziemlich mitgenommen aus: blaue Flecken, ein leichtes Hinken und – wie er mir mit schmerzverzerrtem Grinsen erklärte – eine kleine Schnittwunde am Hintern. Ich habe nicht gefragt, wie das passiert ist. Ich will es auch gar nicht wissen.\n\nIch habe mir einen tulaberrianischen Brandy bestellt, mich in eine Ecke gesetzt und den Moment genossen. Für einen kurzen Augenblick war ich nicht der Chefingenieur, nicht der Griesgram, nicht der Veteran. Nur ein Bajoraner, der überlebt hat. Und der\nsich einen Moment der Ruhe gönnt."},"links":["42fd6edc-90ab-459e-b3a0-67c275f199ce"]},{"id":"4b9738a0-b10c-456d-b1e9-a8eb4b13f255","type":"logbuch","title":"1. Logbuch Okir","content":"","tags":["Trill","Kommando"],"logStats":{"realDay":"30","realMonth":"10","realYear":"2368","stardate":"45829.5","linkedCharId":"1997c8ba-fca1-4303-8197-f3a455a13dde","author":"Verad Okir","rank":"Lt. Commander","ship":"USS Aurora","subject":"Kommando","logText":"Die Aurora hat noch keinen Lichttag unter eigenem Impuls hinter sich – und schon ist mein wissenschaftlicher Auftrag durch einen taktischen Akt der Personalpolitik torpediert worden.\n\nCaptain Soral, halb Vulkanier, halb Romulaner, vollständig unerbittlich, hat mich soeben zum kommissarischen Ersten Offizier ernannt. Ohne Anhörung, ohne Diskussion, ohne Rücksicht auf die tatsächliche Zweckbestimmung dieses Schiffes: die Optimierung meines Zero-Point- Warpkern-Enhancers unter Echtbedingungen. Die Sternenflotte hat keine Kosten gescheut,\ndieses Schiff, den ersten Prototypen der neuen Akira-Klasse, um mein Modul herum zu konstruieren. Und ich bin der Einzige an Bord, der die Formeln versteht, die diesen Maschinenraum überhaupt möglich gemacht haben.\n\nIch habe protestiert. Dreimal. Sachlich, respektvoll, bestimmt. Der Captain hörte sich alles an, hob die Augenbraue – und ignorierte mich vollständig. Seine Begründung: Ich sei „sowieso schon das Bindeglied zwischen Wissenschaft, Technik und Kommando“. Ich würde sagen, ich bin das Rückgrat. Aber gut – diplomatisch gesprochen, war das wohl ein Kompliment.\nIch will kein Kommando. Ich will Ruhe. Ich will präzise, reproduzierbare Datenreihen unter kontrollierten Bedingungen – keine Meetings, keine Personalgespräche, keine Dienstpläne. Commander Talas Sh’reyan, die eigentlich für den Posten vorgesehen ist, ist vorläufig auf Sondermission – klassifiziert. In ihrer Abwesenheit bin also ich jetzt für die Disziplin auf Deck 1\nverantwortlich. Deck 1! Als wäre ich ein Verwaltungsbeamter mit Subraumanschluss.\n\nIch habe zwei Minuten gebraucht, um festzustellen, dass Menschen – und vulkanisch-romulanische Hybriden – erheblich komplizierter sind als jede Warpkernsimulation. Technik ist berechenbar. Menschen nicht. Ich weiß das. Und trotzdem lasse ich mich immer wieder zu diesem lächerlichen Versuch hinreißen, sie verstehen zu wollen. Vielleicht liegt das am\nSymbionten. Vielleicht liegt das an mir. Vielleicht liegt es daran, dass ich immer noch wissen will, was die anderen über mich denken.\nAber gut. Ich bin jetzt Erster Offizier. Ich habe das Abzeichen. Ich habe die Verantwortung. Ich habe noch nicht entschieden, ob ich den Sessel hasse – oder ob ich nur alles daran ablehne, was mich davon abhält, zu tun, was ich am besten kann: diese Flotte voranbringen. Nicht durch Reden. Durch Fortschritt."},"links":["1997c8ba-fca1-4303-8197-f3a455a13dde"]},{"id":"53a51e9a-802c-417e-951d-28761a03a17a","type":"location","title":"Vargas 3","content":"Heimat von Darven Kole und anderen Kolonisten. Haben eine Biowaffe entwickelt, um die cardassianischen Überfälle zu stoppen. Wurden letztendlich von der USS Aurora gestoppt, aber Captain tr'Vishek hat das Biogen in einer weniger tödlichen Form eigenmächtig und ohne das Wissen seiner Crew in der Atmosphäre verteilt, um die Cardassianer dauerhaft von diesem Planeten fernzuhalten.\n","tags":["Cardassianer","Maquis","Planet","Kolonie","Zivilist"],"links":[]},{"id":"4db7025f-3a8f-4688-801e-8e4f69598ba7","type":"ship","title":"USS Mimir","content":"","tags":["Shuttle","Runabout","Föderation","Sternenflotte"],"stats":{"registry":"NCC-62311","missionProfile":"Sensor Pod","serviceDate":"2368","traits":"Runabout, Light Starship, Small Craft, Better Sensors","scale":2,"resistance":2,"crewSupport":2,"shieldsMax":10,"shieldsCurrent":10,"smallCraftReadiness":1,"comms":9,"computers":9,"engines":7,"sensors":8,"structure":7,"weapons":7,"command":0,"conn":2,"engineering":1,"security":1,"medicine":0,"science":0,"shipClass":"Runabout","spaceframe":"Runabout","attacks":"Phaser Banks: Energy Weapon, 4, Versatile 2\n\nMicro Torpedoes: Torpedo, 3, Long Range, High Yield","talents":"RUGGED DESIGN: Whenever a task roll is attempted to patch or repair a breach, a\nd20 may be re-rolled. Further, if the task is successful, the crew may spend Momentum\nto patch a second breach; this will cost 2 Momentum, +1 per additional step of Potency\non that second breach.\n\nHIGH-RESOLUTION SENSORS: The vessel’s sensors can gain large amounts of\naccurate data, though they are extremely sensitive. While the vessel is not in combat, any\nsuccessful task assisted by the ship’s Sensors gains 1 bonus Momentum. Bonus\nMomentum may not be saved."},"links":["af4cdfe4-b562-4804-a840-2fd4e5c98351"]},{"id":"3ec67b99-ce65-4ce6-bd3d-83e784ac052c","type":"ship","title":"USS Bifröst","content":"","tags":["Shuttle","Runabout","Föderation","Sternenflotte"],"stats":{"registry":"NCC-62323","missionProfile":"Long Range Scout","serviceDate":"2368","traits":"Runabout, Light Starship, Small Craft, Comfortable","scale":2,"resistance":2,"crewSupport":2,"shieldsMax":10,"shieldsCurrent":10,"smallCraftReadiness":1,"comms":9,"computers":8,"engines":7,"sensors":7,"structure":7,"weapons":7,"command":0,"conn":2,"engineering":1,"security":1,"medicine":0,"science":0,"shipClass":"Runabout","spaceframe":"Runabout","attacks":"Phaser Banks: Energy Weapon, 4, Versatile 2\n\nMicro Torpedoes: Torpedo, 3, Long Range, High Yield","talents":"RUGGED DESIGN: Whenever a task roll is attempted to patch or repair a breach, a\nd20 may be re-rolled. Further, if the task is successful, the crew may spend Momentum\nto patch a second breach; this will cost 2 Momentum, +1 per additional step of Potency\non that second breach.\n\nREDUCED SENSOR SILHOUETTE: Through a combination of advanced alloys, EM\nshielding, and electronic countermeasures, the starship is difficult to detect via\nelectromagnetic radiation and subspace sensors. Tasks attempting to scan or detect the\nvessel increase in Difficulty by 1."},"links":["af4cdfe4-b562-4804-a840-2fd4e5c98351"]},{"id":"af4cdfe4-b562-4804-a840-2fd4e5c98351","type":"ship","title":"USS Aurora","content":"","tags":["Föderation","Sternenflotte","Raumschiff"],"stats":{"shipClass":"Akira Class","registry":"NCC-623 const ICONS={pc:'⭐',spc:'🎖️',npc:'👤',location:'🌍',ship:'🚀',faction:'🏛️',logbuch:'📋',note:'📝',rule:'📖',scene:'🎭'};
const LABELS={pc:'PC',spc:'SPC',npc:'NPC',location:'Location',ship:'Schiff',faction:'Fraktion',logbuch:'Logbuch',note:'Notiz',rule:'Regel',scene:'Szene'};
const COLORS={pc:'#FFD700',spc:'#FF9900',npc:'#FF6644',location:'#AADDFF',ship:'#BB88FF',faction:'#FFCC00',logbuch:'#66BBDD',note:'#33FFAA',rule:'#FF6699',scene:'#FF7744'};
const TYPE_ORDER=['pc','spc','npc','location','ship','faction','logbuch','note','rule','scene'];
let cur=null,fType='all',fTags=new Set();
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function filtered(){const q=document.getElementById('search').value.toLowerCase();return ALL.filter(e=>{if(fType!=='all'&&e.type!==fType)return false;if(fTags.size>0&&![...fTags].every(t=>(e.tags||[]).includes(t)))return false;if(q)return e.title.toLowerCase().includes(q)||(e.content||'').toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q));return true;})}
function render(){
  const f=filtered();
  const tc={};ALL.forEach(e=>{tc[e.type]=(tc[e.type]||0)+1});
  const tagC={};ALL.forEach(e=>(e.tags||[]).forEach(t=>{tagC[t]=(tagC[t]||0)+1}));
  const tags=Object.entries(tagC).sort((a,b)=>b[1]-a[1]).map(([t])=>t);
  const orderedTypes=TYPE_ORDER.filter(t=>tc[t]);
  document.getElementById('sidebar').innerHTML=
    '<div style="padding:0 0 8px"><div class="sidebar-label">Typ</div>'+
    `<button class="type-btn ${fType==='all'?'active':''}" onclick="setType('all')"><span class="type-dot" style="background:#667788"></span>Alle (${ALL.length})</button>`+
    orderedTypes.map(t=>`<button class="type-btn ${fType===t?'active':''}" onclick="setType('${t}')"><span class="type-dot" style="background:${COLORS[t]||'#888'}"></span>${ICONS[t]||''} ${LABELS[t]||t} (${tc[t]})</button>`).join('')+
    '</div><div class="sidebar-divider"></div>'+
    '<div style="display:flex;align-items:center;padding:0 12px 6px;gap:6px">'+
    '<span class="sidebar-label" style="padding:0">Tags</span>'+
    (fTags.size>0?`<button onclick="clearTags()" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-family:var(--font-mono);font-size:9px;padding:2px 6px;cursor:pointer;transition:all .15s" onmouseover="this.style.color='var(--orange)';this.style.borderColor='var(--orange)'" onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)'">✕ Alle</button>`:'')+'</div>'+
    '<div class="sidebar-tags">'+
    tags.map(t=>`<span class="tag-sb ${fTags.has(t)?'active':''}" onclick="setTag('${esc(t)}')">${esc(t)}</span>`).join('')+'</div>';
  document.getElementById('list').innerHTML=f.length?f.map(e=>`
    <div class="entry-card ${e.id===cur?'active':''}" onclick="select('${e.id}')">
      <div class="ec-title">${ICONS[e.type]||''} ${esc(e.title)}</div>
      <div class="ec-meta" style="color:${COLORS[e.type]||'#888'}">${LABELS[e.type]||e.type}</div>
      ${(e.tags||[]).length?`<div class="ec-tags">${e.tags.slice(0,3).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}</div>`:''}
    </div>`).join(''):'<div class="empty-list">Keine Einträge</div>';
}
function sb(label,value,color){if(value==null||value==='')return '';return `<div class="stat-box"><div class="stat-value" style="color:${color}">${esc(String(value))}</div><div class="stat-label">${label}</div></div>`;}
function stressBoxes(s){const max=s.stressMax||s.stress||0;const cur=s.stressCurrent??max;if(!max)return '';let b='';for(let i=1;i<=max;i++)b+=`<span class="stress-box ${i<=cur?'filled':'empty'}"></span>`;return `<div class="tracker-block"><div class="viewer-section-title">STRESS</div><div class="tracker-boxes">${b}</div><div class="tracker-count">${cur} / ${max}</div></div>`;}
function detBoxes(s){const val=s.determination??0;let b='';for(let i=1;i<=3;i++)b+=`<span class="det-box ${i<=val?'filled':'empty'}"></span>`;return `<div class="tracker-block"><div class="viewer-section-title">DETERMINATION</div><div class="tracker-boxes">${b}</div><div class="tracker-count">${val} / 3</div></div>`;}
function shieldBoxes(s){const max=s.shieldsMax||0;const cur=s.shieldsCurrent??max;if(!max)return '';const t50=Math.ceil(max*.5);const t25=Math.ceil(max*.25);let b='';for(let i=1;i<=max;i++){const warn=i===t25?'warn25':i===t50?'warn50':'';b+=`<span class="shield-box ${i<=cur?'filled':'empty'} ${warn}"></span>`;}const pct=Math.round((cur/max)*100);const col=pct>50?'#AADDFF':pct>25?'#FFCC00':'#FF4444';return `<div class="tracker-block"><div class="viewer-section-title">SHIELDS</div><div class="tracker-boxes">${b}</div><div class="tracker-count" style="color:${col}">${cur} / ${max}</div></div>`;}
function talentBlocks(text){if(!text)return '';return text.split('\n\n').filter(Boolean).map(t=>{const ci=t.indexOf(':');if(ci>0&&ci<60){const n=t.slice(0,ci).trim(),d=t.slice(ci+1).trim();return `<div class="talent-block"><span class="talent-name">${esc(n)}:</span> ${esc(d)}</div>`;}return `<div class="talent-block">${esc(t.trim())}</div>`;}).join('');}
function select(id){
  cur=id;render();
  const e=ALL.find(x=>x.id===id);if(!e)return;
  const s=e.stats||{};
  let h=`<div class="type-badge" style="background:${COLORS[e.type]||'#333'}22;color:${COLORS[e.type]||'#888'};border:1px solid ${COLORS[e.type]||'#333'}44">${ICONS[e.type]||''} ${LABELS[e.type]||e.type}</div><div class="viewer-title">${esc(e.title)}</div>`;
  if((e.tags||[]).length)h+=`<div class="viewer-tags">${e.tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}</div>`;
  if(e.type==='logbuch'){
    const ls=e.logStats||{};
    h+=`<div class="logbuch-viewer"><div class="logbuch-header"><div class="logbuch-class">${esc(ls.classification||'Persönliches Logbuch')}</div><div style="text-align:right"><span class="logbuch-sd-lbl">STERNENZEIT</span><div class="logbuch-sd">${esc(ls.stardate||'–')}</div></div></div><div class="logbuch-author-row"><div>${ls.rank?'<div class="logbuch-rank">'+esc(ls.rank)+'</div>':''}<div class="logbuch-author-name">${esc(ls.author||e.title)}</div>${ls.ship?'<div class="logbuch-ship">'+esc(ls.ship)+'</div>':''}</div></div>${ls.subject?'<div class="logbuch-subject">Betreff: '+esc(ls.subject)+'</div>':''}<div class="logbuch-text">${esc(ls.logText||'')}</div><div class="logbuch-footer">– Ende des Eintrags –</div></div>`;
  } else if((e.type==='pc'||e.type==='spc'||e.type==='npc')&&s){
    const hF=[['pronouns','PRONOUNS'],['rank','RANK'],['assignment','ASSIGNMENT'],['characterRole','CHARACTER ROLE'],['species','SPECIES & TRAITS'],['careerPath','CAREER PATH']];
    const hI=hF.filter(([k])=>s[k]).map(([k,l])=>`<div class="ship-header-item"><div class="ship-header-label">${l}</div><div class="ship-header-value">${esc(s[k])}</div></div>`).join('');
    if(hI)h+=`<div class="ship-header-grid">${hI}</div>`;
    h+=`<div class="viewer-section-title">ATTRIBUTES</div><div class="stats-row">${sb('CONTROL',s.control,'#AADDFF')}${sb('DARING',s.daring,'#AADDFF')}${sb('FITNESS',s.fitness,'#AADDFF')}${sb('INSIGHT',s.insight,'#AADDFF')}${sb('PRESENCE',s.presence,'#AADDFF')}${sb('REASON',s.reason,'#AADDFF')}</div><div class="viewer-section-title">DEPARTMENTS</div><div class="stats-row">${sb('COMMAND',s.command,'#CC3333')}${sb('CONN',s.conn,'#CC3333')}${sb('ENGINEERING',s.engineering,'#FFCC00')}${sb('SECURITY',s.security,'#FFCC00')}${sb('MEDICINE',s.medicine,'#4488CC')}${sb('SCIENCE',s.science,'#4488CC')}</div>`;
    const trackers=stressBoxes(s)+detBoxes(s);
    if(trackers)h+=`<div class="trackers-row">${trackers}</div>`;
    if(s.focuses)h+=`<div class="viewer-section-title">FOCUSES</div><div class="focuses-list">${s.focuses.split(/[,\n]/).filter(Boolean).map(f=>`<span class="focus-chip">${esc(f.trim())}</span>`).join('')}</div>`;
    if(s.values)h+=`<div class="viewer-section-title">VALUES</div>${s.values.split('\n').filter(Boolean).map(v=>`<div class="value-item">${esc(v.trim())}</div>`).join('')}`;
    if(s.attacks)h+=`<div class="viewer-section-title">ATTACKS</div><div class="attacks-list">${s.attacks.split('\n').filter(Boolean).map(a=>`<div class="attack-item">⬡ ${esc(a.trim())}</div>`).join('')}</div>`;
    if(s.talents)h+=`<div class="viewer-section-title">TALENTS</div>${talentBlocks(s.talents)}`;
    if(s.specialAbilities)h+=`<div class="viewer-section-title">SPECIAL ABILITIES</div>${talentBlocks(s.specialAbilities)}`;
    if(s.equipment)h+=`<div class="viewer-section-title">EQUIPMENT</div><div class="viewer-content">${esc(s.equipment)}</div>`;
  } else if(e.type==='ship'&&s){
    const hF=[['shipClass','CLASS'],['registry','REGISTRY'],['missionProfile','MISSION PROFILE'],['serviceRecord','SERVICE RECORD'],['spaceframe','SPACEFRAME']];
    const hI=hF.filter(([k])=>s[k]).map(([k,l])=>`<div class="ship-header-item"><div class="ship-header-label">${l}</div><div class="ship-header-value">${esc(s[k])}</div></div>`).join('');
    if(hI)h+=`<div class="ship-header-grid">${hI}</div>`;

    if(s.attacks)h+=`<div class="viewer-section-title">ATTACKS</div><div class="attacks-list">${s.attacks.split('\n').filter(Boolean).map(a=>`<div class="attack-item">⬡ ${esc(a.trim())}</div>`).join('')}</div>`;

  }

  document.getElementById('viewer').innerHTML=h;
}
function setType(t){fType=t;fTags=new Set();render()}
function setTag(t){if(fTags.has(t))fTags.delete(t);else fTags.add(t);render()}

render();if(ALL.length)select(ALL[0].id);
